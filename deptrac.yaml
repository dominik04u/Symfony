deptrac:
    paths:
        - ./src

    exclude_files:
        - '#.*Test.*#'
        - '#.*Kernel.php#'

    layers:
        # =========================
        # COMMON BOUNDED CONTEXT
        # =========================
        - name: Common.Domain
          collectors:
              - type: directory
                value: src/Common/Domain/.*

        - name: Common.Application
          collectors:
              - type: directory
                value: src/Common/Application/.*

        - name: Common.Infrastructure
          collectors:
              - type: directory
                value: src/Common/Infrastructure/.*

        # =========================
        # PRODUCT BOUNDED CONTEXT
        # =========================
        - name: Product.Domain
          collectors:
              - type: directory
                value: src/Product/Domain/.*

        - name: Product.Application
          collectors:
              - type: directory
                value: src/Product/Application/.*

        - name: Product.Infrastructure
          collectors:
              - type: directory
                value: src/Product/Infrastructure/.*

        # =========================
        # ORDER BOUNDED CONTEXT
        # =========================
        - name: Order.Domain
          collectors:
              - type: directory
                value: src/Order/Domain/.*

        - name: Order.Application
          collectors:
              - type: directory
                value: src/Order/Application/.*

        - name: Order.Infrastructure
          collectors:
              - type: directory
                value: src/Order/Infrastructure/.*

        # =========================
        # PAYMENT BOUNDED CONTEXT
        # =========================
        - name: Payment.Domain
          collectors:
              - type: directory
                value: src/Payment/Domain/.*

        - name: Payment.Application
          collectors:
              - type: directory
                value: src/Payment/Application/.*

        - name: Payment.Infrastructure
          collectors:
              - type: directory
                value: src/Payment/Infrastructure/.*

        # =========================
        # SHARED
        # =========================
        - name: Shared.Domain
          collectors:
              - type: directory
                value: src/Shared/Domain/.*

        - name: Shared.Application
          collectors:
              - type: directory
                value: src/Shared/Application/.*

        - name: Shared.Infrastructure
          collectors:
              - type: directory
                value: src/Shared/Infrastructure/.*

    ruleset:

        # =========================
        # SHARED IS PURE (Domain nic, Application/Infra tylko w dół)
        # =========================
        Shared.Domain: []

        Shared.Application:
            - Shared.Domain

        Shared.Infrastructure:
            - Shared.Application
            - Shared.Domain

        # =========================
        # COMMON RULE
        # =========================
        Common.Domain:
            - Shared.Domain

        Common.Application:
            - Common.Domain
            - Shared.Domain
            - Shared.Application

        Common.Infrastructure:
            - Common.Application
            - Common.Domain
            - Shared.Domain
            - Shared.Application
            - Shared.Infrastructure

        # =========================
        # DOMAIN RULE (PURE)
        # =========================
        Product.Domain:
            - Shared.Domain

        Order.Domain:
            - Shared.Domain

        Payment.Domain:
            - Shared.Domain

        # =========================
        # APPLICATION RULE
        # =========================
        Product.Application:
            - Product.Domain
            - Shared.Domain
            - Shared.Application

        Order.Application:
            - Order.Domain
            - Shared.Domain
            - Shared.Application

        Payment.Application:
            - Payment.Domain
            - Shared.Domain
            - Shared.Application

        # =========================
        # INFRASTRUCTURE RULE
        # =========================
        Product.Infrastructure:
            - Product.Application
            - Product.Domain
            - Shared.Domain
            - Shared.Application
            - Shared.Infrastructure

        Order.Infrastructure:
            - Order.Application
            - Order.Domain
            - Shared.Domain
            - Shared.Application
            - Shared.Infrastructure

        Payment.Infrastructure:
            - Payment.Application
            - Payment.Domain
            - Shared.Domain
            - Shared.Application
            - Shared.Infrastructure
