deptrac:
    paths:
        - ./src

    exclude_files:
        - '#.*Test.*#'
        - '#.*Kernel.php#'
        - '#.*Cache#'

    layers:
        - name: Domain
          collectors:
              - type: directory
                value: src/*/Domain/.*

        - name: Application
          collectors:
              - type: directory
                value: src/*/Application/.*

        - name: Infrastructure
          collectors:
              - type: directory
                value: src/*/Infrastructure/.*

    ruleset:
        Domain:
            - Application: ~
            - Infrastructure: false   # 🔥 twarda granica

        Application:
            - Domain: ~
            - Infrastructure: false   # 🔥 rekomendowane (czystszy DDD)

        Infrastructure:
            - Domain: ~
            - Application: ~
