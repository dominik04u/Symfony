name: PR Review (PHPStan + PHPCS + Reviewdog)

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Reviewdog
        uses: reviewdog/action-setup@v1

      # =========================
      # PHPSTAN → SUMMARY (CHECK)
      # =========================
      - name: PHPStan (PR summary)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vendor/bin/phpstan analyse src --error-format=raw \
          | reviewdog -f=phpstan \
            -name="PHPStan" \
            -reporter=github-pr-check \
            -level=warning

      # =========================
      # PHPCS → INLINE COMMENTS
      # =========================
      - name: PHPCS (PR review comments)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vendor/bin/phpcs --standard=PSR12 --report=checkstyle src \
          | reviewdog -f=checkstyle \
            -name="PHPCS" \
            -reporter=github-pr-review \
            -filter-mode=diff_context \
            -level=warning