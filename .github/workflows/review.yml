name: PR Review (PHPStan + PHPCS + Reviewdog)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Reviewdog
        uses: reviewdog/action-setup@v1

      # =========================
      # FETCH BASE BRANCH (KLUCZ)
      # =========================
      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1

      # =========================
      # PHPSTAN → SUMMARY (CHECK)
      # =========================
      - name: PHPStan (PR summary)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vendor/bin/phpstan analyse src --error-format=raw \
          | reviewdog -f=phpstan \
            -name="PHPStan" \
            -reporter=github-pr-check \
            -level=warning \
            -filter-mode=diff_context

      # =========================
      # PHPCS → INLINE REVIEW
      # =========================
      - name: PHPCS (PR inline review)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vendor/bin/phpcs --standard=PSR12 --report=checkstyle src \
          | reviewdog -f=checkstyle \
            -name="PHPCS" \
            -reporter=github-pr-review \
            -level=warning \
            -filter-mode=diff_context
