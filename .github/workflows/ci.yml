name: CI + PR Review (DDD enforced)

on:
    pull_request:

permissions:
    contents: read
    pull-requests: write
    checks: write

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:

            # =========================
            # CHECKOUT
            # =========================
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # =========================
            # PHP SETUP
            # =========================
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  coverage: none

            # =========================
            # DEPENDENCIES (ONLY HERE)
            # =========================
            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist --optimize-autoloader

            # =========================
            # REVIEWDOG
            # =========================
            - name: Install Reviewdog
              uses: reviewdog/action-setup@v1

            # =========================
            # BASE BRANCH (DIFF CONTEXT)
            # =========================
            - name: Fetch base branch
              run: git fetch origin ${{ github.base_ref }} --depth=1

            # =========================
            # 🟥 CI GATES (BLOCK MERGE)
            # =========================
            - name: PHPStan (CI gate)
              run: vendor/bin/phpstan analyse src

            - name: PHPUnit
              run: vendor/bin/phpunit

            # =========================
            # 🧱 ARCHITECTURE CHECK (DEPTRAC)
            # =========================
            -   name: Deptrac FULL DEBUG
                run: |
                    echo "=== ROOT ==="
                    pwd

                    echo "=== FILES ==="
                    ls -la

                    echo "=== SRC TREE ==="
                    ls -R src || true

                    echo "=== CONFIG ==="
                    cat deptrac.yaml || echo "NO CONFIG FOUND"

                    echo "=== RUN DEPTRAC ==="
                    vendor/bin/deptrac analyse -vvv --reporter=text

            # =========================
            # 💬 PR REVIEW LAYER
            # =========================

            - name: PHPStan (PR review)
              env:
                  REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  vendor/bin/phpstan analyse src --error-format=raw \
                  | reviewdog -f=phpstan \
                    -name="PHPStan" \
                    -reporter=github-pr-check \
                    -level=warning \
                    -filter-mode=diff_context

            - name: PHPCS (PR review)
              env:
                  REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  vendor/bin/phpcs --standard=PSR12 --report=checkstyle src \
                  | reviewdog -f=checkstyle \
                    -name="PHPCS" \
                    -reporter=github-pr-review \
                    -level=warning \
                    -filter-mode=diff_context
